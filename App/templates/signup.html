{% extends "layout.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
  <div class="flex justify-center items-center min-h-[70vh]">
    <div class="card bg-base-100 w-full max-w-sm shadow-lg p-6">

      <!--{% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-error mb-4">
          {% for message in messages %}
            <span>{{ message }}</span>
          {% endfor %}
        </div>
      {% endif %}
      {% endwith %}-->

      <h1 class="text-2xl font-bold mb-1">Create an account</h1>
      <p class="text-sm mb-4">
        Already have an account?
        <a href="{{ url_for('auth_views.login_page') }}" class="link link-accent font-medium">
          Login
        </a>
      </p>

      <form action="{{ url_for('auth_views.signup_page') }}" method="post" class="space-y-4">

        <div class="form-control">
          <label for="username" class="label">
            <span class="label-text font-medium">Username</span>
          </label>
          <input type="text" id="username" name="username" required
                 class="input input-bordered w-full">
        </div>

        <div class="form-control">
          <label for="email" class="label">
            <span class="label-text font-medium">Email</span>
          </label>
          <input type="email" id="email" name="email" required
                 class="input input-bordered w-full">
        </div>

        <div class="form-control">
          <label for="password" class="label">
            <span class="label-text font-medium">Password</span>
          </label>
          <input type="password" id="password" name="password" required
                 class="input input-bordered w-full">
        </div>

        <button type="submit" class="btn btn-accent w-full">Sign up</button>
      </form>
    </div>
  </div>
{% endblock %}
