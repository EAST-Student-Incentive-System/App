{% extends 'layout.html' %}

{% block title %}
  Flagged Students
{% endblock %}

{% block content %}
  <div class="max-w-6xl mx-auto px-6 py-8">
    <!-- HEADER ROW -->
    <div class="flex items-center mb-8 gap-4">
      <h1 class="text-3xl font-bold text-gray-800 flex-1 text-center">Flagged Students</h1>
    </div>

    <!-- TABLE -->
    <div class="overflow-x-auto">
      <table id="flagged-table" class="table w-full">
        <thead>
          <tr>
            <th>Name</th>
            <th>View flagged activity</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for student in flagged_students %}
            <tr>
              <td>{{ student.name }}</td>
              <td>
                <a href="{{ url_for('staff_views.view_flagged_activity', student_id=student.student_id) }}" class="btn btn-sm btn-primary">View Activity</a>
              </td>
              <td>
                <!-- Action buttons (e.g., View, Unflag) -->
                <a href="{{ url_for('staff_views.unflag_student_route', student_id=student.student_id) }}" class="btn btn-sm btn-error">✅</a>
                <a href="{{ url_for('staff_views.flag_student_route', student_id=student.student_id) }}" class="btn btn-sm btn-error">❌</a>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
