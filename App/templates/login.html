{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="flex justify-center items-center min-h-[70vh]">
    <div class="card bg-base-100 shadow-xl w-full max-w-md p-6">
      <h1 class="text-2xl font-bold mb-2">Login</h1>

      <p class="mb-4 text-sm">
        Don’t have an account?
        <a href="{{ url_for('auth_views.signup_page') }}" class="link link-accent font-medium">
          Sign up
        </a>
      </p>

      <form method="POST" action="{{ url_for('auth_views.login_action') }}" class="space-y-4">
        <div>
          <label for="username" class="block font-semibold mb-1">Username</label>
          <input type="text" id="username" name="username" required class="input input-bordered w-full">
        </div>

        <div>
          <label for="password" class="block font-semibold mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" required class="input input-bordered w-full pr-16">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-accent cursor-pointer text-sm font-medium" onclick="togglePassword()">Show</span>
          </div>
        </div>

        <div class="text-right text-sm">
          <a href="{{ url_for('auth_views.forgot_password_page') }}" class="link link-accent">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="btn btn-accent w-full">Login</button>
      </form>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const toggleText = document.querySelector("span[onclick]");
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleText.textContent = "Hide";
      } else {
        passwordInput.type = "password";
        toggleText.textContent = "Show";
      }
    }
  </script>
{% endblock %}
