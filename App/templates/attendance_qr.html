{% extends "layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen text-center">
  <h1 class="text-2xl font-bold mb-4">
    {{ event.name }} Attendance
  </h1>

  <img id="qr-img" 
     src="{{ url_for('event_views.qr_image', event_id=event.id) }}?t={{ timestamp }}" 
     alt="QR Code" 
     class="mx-auto border rounded-lg shadow-md" 
     width="320">
<p id="countdown" class="text-gray-700 font-semibold mt-2">Refreshing in 10s</p>

  <p class="text-gray-500 mt-3">
    QR refreshes every 10 seconds
  </p> 
  
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", function() {
  let countdown = 10;
  const countdownEl = document.getElementById("countdown");
  const qrImg = document.getElementById("qr-img");

  setInterval(() => {
    countdownEl.textContent = "Refreshing in " + countdown + "s";
    countdown--;

    if (countdown < 0) {
      countdown = 10; // reset countdown
      qrImg.src = "{{ url_for('event_views.qr_image', event_id=event.id) }}?t=" + new Date().getTime();
    }
  }, 1000);
});
</script>
{% endblock %}
