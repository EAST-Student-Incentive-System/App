{% extends "layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen text-center">
  <h1 class="text-2xl font-bold mb-4">
    {{ event.name }} Attendance
  </h1>

  <img src="data:image/png;base64,{{ qr }}" 
       alt="QR Code" 
       class="mx-auto border rounded-lg shadow-md" 
       width="320">

  <p class="text-gray-500 mt-3">
    QR refreshes every 30 seconds
  </p>

  <p id="countdown" class="text-gray-700 font-semibold mt-2">Refreshing in 30s</p>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function() {
    let countdown = 30;
    const countdownEl = document.getElementById("countdown");

    const interval = setInterval(() => {
      countdownEl.textContent = "Refreshing in " + countdown + "s";
      countdown--;

      if (countdown < 0) {
        clearInterval(interval);
        window.location.reload(true);
      }
    }, 1000);
  });
</script>
{% endblock %}
