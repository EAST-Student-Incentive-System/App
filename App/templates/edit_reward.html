<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% if reward %}Edit Reward{% else %}Create Reward{% endif %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
</head>
<body data-theme="light" class="bg-base-200">

<!-- Navbar -->
<div class="navbar px-6" style="background-color:#9b30ff; color:white;">
  <div class="flex-1">
    <a href="{{ url_for('reward_views.list_rewards_page')}}" class="btn btn-ghost normal-case text-white"> ← </a>
    <a class="text-xl font-bold">Merit</a>
  </div>
  <div class="flex-none">
    <ul class="menu menu-horizontal px-1">
      <li><a href="{{ url_for('event_views.get_staff_events_route')}}">Events</a></li>
      <li><a href="{{ url_for('reward_views.list_rewards_page')}}">Rewards</a></li>
      <li><a href="{{ url_for('auth_views.logout_action')}}">Logout</a></li>
    </ul>
  </div>
</div>

<!-- Page wrapper -->
<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-2">{% if reward %}Edit Reward{% else %}Create Reward{% endif %}</h1>
  <p class="text-gray-600 mb-6">Fill in the details below to create a new reward or edit an existing one.</p>

  <form id="rewardForm"
        class="card bg-base-100 shadow-xl p-6 flex gap-6 relative"
        method="POST"
        action="{% if reward %}{{ url_for('reward_views.update_reward_page', reward_id=reward.id) }}{% else %}{{ url_for('reward_views.create_reward_page') }}{% endif %}"
        enctype="multipart/form-data">

    <!-- Hidden reward ID -->
    {% if reward %}
      <input type="hidden" name="reward_id" value="{{ reward.id }}">
    {% endif %}

    <!-- Left column: Image + Description -->
    <div class="flex-1 space-y-4">
      <div class="border rounded-lg flex items-center justify-center min-h-[300px] cursor-pointer bg-base-200" onclick="document.getElementById('rewardImage').click()">
        {% if reward and reward.image %}
          <img id="rewardImagePreview" alt="Reward image" src="{{ reward.image }}" class="max-h-[300px] object-cover rounded-lg">
        {% else %}
          <span id="rewardImagePlaceholder" class="text-gray-500">Click to upload image</span>
        {% endif %}
        <input type="file" id="rewardImage" name="image" accept="image/*" hidden>
      </div>

      <label class="form-control">
        <span class="label-text">Description</span>
        <textarea id="description" name="description" class="textarea textarea-bordered h-32">{{ reward.description if reward else '' }}</textarea>
      </label>
    </div>

    <!-- Right column: Name, Points, Active -->
    <div class="flex-1 space-y-4">
      <label class="form-control">
        <span class="label-text">Name</span>
        <input type="text" id="name" name="name" value="{{ reward.name if reward else '' }}" class="input input-bordered" required>
      </label>

      <label class="form-control">
        <span class="label-text">Point Cost</span>
        <input type="number" id="point_cost" name="point_cost" value="{{ reward.pointCost if reward else '' }}" class="input input-bordered" required>
      </label>

      <label class="form-control flex items-start gap-3 cursor-pointer">
        <span class="label-text font-semibold mt-1">Active</span>
        <input type="checkbox" name="active" class="toggle toggle-primary" {% if reward and reward.active %}checked{% endif %}>
      </label>

      <div class="flex gap-4 mt-4">
        <button type="submit" class="btn btn-primary">{% if reward %}Update Reward{% else %}Create Reward{% endif %}</button>
      </div>
    </div>
  </form>
</div>

<script>
  // Preview uploaded image
  const fileInput = document.getElementById('rewardImage');
  const previewBox = document.getElementById('rewardImagePreview');
  const placeholder = document.getElementById('rewardImagePlaceholder');

  if (fileInput) {
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          if (previewBox) {
            previewBox.src = e.target.result;
          } else {
            const img = document.createElement('img');
            img.id = "rewardImagePreview";
            img.src = e.target.result;
            img.className = "max-h-[300px] object-cover rounded-lg";
            fileInput.parentNode.insertBefore(img, fileInput);
            if (placeholder) placeholder.style.display = "none";
          }
        };
        reader.readAsDataURL(file);
      }
    });
  }
</script>
</body>
</html>
